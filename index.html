<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>NEO GUARD REEL POUCH｜大切なリールを移動中の傷から守るネオプレーンポーチ</title>
    <meta
      name="description"
      content="厚みのあるネオプレーン素材が、釣行時の衝撃・擦れ・水しぶきからリールを守るリールポーチ「NEO GUARD REEL POUCH」。ロッドに付けたまま簡単装着。S/M/Lの3サイズ、1,980円（税込）。※ポートフォリオ用の架空商品LPです。"
    />

    <!-- canonical: 本番公開時に実URLへ差し替えてください -->
    <link rel="canonical" href="https://example.com/neo-guard-reel-pouch/" />

    <!-- OGP -->
    <meta property="og:type" content="product" />
    <meta property="og:site_name" content="NEO GUARD" />
    <meta property="og:title" content="NEO GUARD REEL POUCH｜大切なリールを移動中の傷から守る" />
    <meta
      property="og:description"
      content="ネオプレーン素材で釣行時の衝撃・擦れ・水しぶきからリールを保護。ロッドに付けたまま簡単装着。※架空商品のポートフォリオLPです。"
    />
    <!-- OGP画像: 1200x630 の実画像に差し替えてください -->
    <meta property="og:image" content="https://example.com/neo-guard-reel-pouch/ogp.png" />
    <meta property="og:url" content="https://example.com/neo-guard-reel-pouch/" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!--
      構造化データ (Product)。
      本ページは架空商品のため brand を "NEO GUARD (Portfolio Concept)" とし、
      description にもデモである旨を明記しています。実運用時は実データへ差し替えてください。
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "NEO GUARD REEL POUCH",
        "description": "ネオプレーン素材で釣行時の衝撃・擦れ・水しぶきからリールを保護するリールポーチ。※本商品はポートフォリオ制作を目的とした架空（デモ）商品です。",
        "brand": { "@type": "Brand", "name": "NEO GUARD (Portfolio Concept)" },
        "category": "Fishing Reel Protection",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "128"
        },
        "offers": {
          "@type": "Offer",
          "priceCurrency": "JPY",
          "price": "1980",
          "availability": "https://schema.org/InStock",
          "url": "https://example.com/neo-guard-reel-pouch/"
        },
        "disambiguatingDescription": "Fictional product created for a portfolio. Not for sale."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
