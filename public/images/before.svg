<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="タックルバッグの中で複数のリールや釣具が直接ぶつかり、擦り傷が付いている状態">
  <rect width="600" height="450" fill="#eceae6" />

  <!-- tackle bag interior -->
  <rect x="70" y="120" width="460" height="260" rx="22" fill="#5a626b" />
  <rect x="70" y="120" width="460" height="52" rx="22" fill="#4a525b" />
  <rect x="92" y="150" width="416" height="210" rx="14" fill="#69727c" />

  <!-- bare reels touching each other -->
  <g transform="translate(214 264)">
    <path d="M-40 -42 q74 -14 100 26 q10 44 -24 58 q-66 12 -88 -18 q-16 -42 12 -66z" fill="#3a434d" stroke="#2b333b" stroke-width="2" />
    <ellipse cx="-58" cy="2" rx="22" ry="44" fill="#5c6873" stroke="#454f59" stroke-width="2" />
    <ellipse cx="-58" cy="-40" rx="22" ry="8" fill="#8a97a1" />
    <ellipse cx="-58" cy="2" rx="10" ry="20" fill="#39424b" />
    <path d="M-76 -36 q-22 40 0 76" fill="none" stroke="#9aa6af" stroke-width="4" stroke-linecap="round" />
    <circle cx="56" cy="24" r="13" fill="#242c34" />
    <rect x="-2" y="56" width="8" height="26" rx="4" fill="#333c45" />
  </g>
  <g transform="translate(336 280)">
    <path d="M-40 -42 q74 -14 100 26 q10 44 -24 58 q-66 12 -88 -18 q-16 -42 12 -66z" fill="#4b5661" stroke="#39424b" stroke-width="2" />
    <ellipse cx="-58" cy="2" rx="22" ry="44" fill="#6b7883" stroke="#525c66" stroke-width="2" />
    <ellipse cx="-58" cy="-40" rx="22" ry="8" fill="#98a4ae" />
    <ellipse cx="-58" cy="2" rx="10" ry="20" fill="#434c56" />
    <path d="M-76 -36 q-22 40 0 76" fill="none" stroke="#aab5be" stroke-width="4" stroke-linecap="round" />
    <circle cx="56" cy="24" r="13" fill="#2a323a" />
  </g>

  <!-- lure box crammed alongside -->
  <rect x="416" y="222" width="92" height="128" rx="8" fill="#828c96" />
  <g stroke="#69727c" stroke-width="2">
    <line x1="416" y1="264" x2="508" y2="264" />
    <line x1="416" y1="306" x2="508" y2="306" />
    <line x1="462" y1="222" x2="462" y2="350" />
  </g>

  <!-- scuff / scratch marks where they contact -->
  <g stroke="#c0533a" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="276" y1="250" x2="298" y2="242" />
    <line x1="280" y1="266" x2="302" y2="260" />
    <line x1="150" y1="240" x2="168" y2="234" />
  </g>

  <!-- BEFORE label -->
  <rect x="70" y="120" width="108" height="34" fill="#8a6d3b" />
  <text x="124" y="143" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="700" letter-spacing="2" fill="#ffffff">BEFORE</text>
</svg>
