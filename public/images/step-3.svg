<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="面ファスナーでベルトを固定し、装着が完了した状態">
  <rect width="480" height="360" fill="#eef1f3" />
  <ellipse cx="240" cy="312" rx="150" ry="16" fill="#123047" opacity="0.08" />

  <!-- rod -->
  <polygon points="60,150 420,150 420,162 60,162" fill="#2b2f34" />

  <!-- pouch on reel, fully fastened -->
  <g transform="translate(240 214)">
    <rect x="-104" y="-58" width="208" height="132" rx="32" fill="#0e2536" transform="translate(3 4)" />
    <rect x="-106" y="-60" width="208" height="132" rx="32" fill="#163a54" />
    <path d="M-78 -42 q78 -16 146 4 v24 q-78 -18 -146 0z" fill="#1d496a" opacity="0.5" />
    <rect x="-90" y="-44" width="176" height="100" rx="20" fill="none" stroke="#5c86a6" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" />
    <!-- fastened belt across -->
    <rect x="-30" y="-60" width="60" height="132" fill="#0f2f45" />
    <rect x="-26" y="-54" width="52" height="120" rx="4" fill="none" stroke="#37648a" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7" />
    <!-- velcro patch pressed down -->
    <rect x="-22" y="-8" width="44" height="40" rx="4" fill="#123449" />
    <g stroke="#2c5570" stroke-width="1" opacity="0.7">
      <line x1="-18" y1="-2" x2="18" y2="-2" />
      <line x1="-18" y1="6" x2="18" y2="6" />
      <line x1="-18" y1="14" x2="18" y2="14" />
      <line x1="-18" y1="22" x2="18" y2="22" />
    </g>
    <!-- brand tag -->
    <rect x="-88" y="34" width="70" height="22" rx="5" fill="#eef2f5" />
    <text x="-53" y="49" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#123047">NEO GUARD</text>
  </g>

  <!-- secured check badge -->
  <g>
    <circle cx="356" cy="118" r="26" fill="#1c7a4a" />
    <path d="M344 118 l9 9 16 -18" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
