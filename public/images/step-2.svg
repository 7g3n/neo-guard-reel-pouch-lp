<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="ポーチの周りに固定ベルトを巻く手順">
  <rect width="480" height="360" fill="#eef1f3" />
  <ellipse cx="240" cy="312" rx="150" ry="16" fill="#123047" opacity="0.08" />

  <!-- rod -->
  <polygon points="60,150 420,150 420,162 60,162" fill="#2b2f34" />

  <!-- pouch on reel -->
  <g transform="translate(240 214)">
    <rect x="-104" y="-58" width="208" height="132" rx="32" fill="#0e2536" transform="translate(3 4)" />
    <rect x="-106" y="-60" width="208" height="132" rx="32" fill="#163a54" />
    <path d="M-78 -42 q78 -16 146 4 v24 q-78 -18 -146 0z" fill="#1d496a" opacity="0.5" />
    <rect x="-90" y="-44" width="176" height="100" rx="20" fill="none" stroke="#5c86a6" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" />
    <!-- brand tag -->
    <rect x="-58" y="34" width="80" height="22" rx="5" fill="#eef2f5" />
    <text x="-18" y="49" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" fill="#123047">NEO GUARD</text>
  </g>

  <!-- belt wrapping around -->
  <g>
    <rect x="206" y="150" width="60" height="136" fill="#0f2f45" />
    <rect x="210" y="156" width="52" height="124" rx="4" fill="none" stroke="#37648a" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7" />
    <!-- loose end lifting up-right -->
    <path d="M266 156 l70 -34 a12 12 0 0 1 17 6 l5 12 -80 40z" fill="#0f2f45" />
    <rect x="336" y="118" width="26" height="20" rx="3" fill="#123449" />
  </g>

  <!-- wrap motion arrow -->
  <g stroke="#e45a2a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M356 120 q44 22 30 70" />
    <path d="M372 184 l7 12 13 -6" />
  </g>
</svg>
